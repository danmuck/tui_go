# tui.config.toml — runtime defaults for tui_go.
# Absent fields fall back to package defaults.
# Color values are 256-color palette indexes (0–255).

[tui]
menu_selected_prefix   = ">"
menu_unselected_prefix = " "
menu_index_width       = 2
input_cursor           = "_"
divider_width          = 32
max_width              = 48
centered               = true
menu_title_prefix      = "-+[ "
menu_title_postfix     = " ]~-"

[colors]
menu    = 14   # bright cyan
title   = 15   # bright white
prompt  = 10   # bright green
data    = 7    # white
divider = 8    # gray
